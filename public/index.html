<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Voice Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel hero">
        <div>
          <p class="eyebrow">Realtime phone assistant</p>
          <h1>AI Voice Assistant</h1>
          <p class="lede">
            Production-style prototype for a voice assistant.
          </p>
        </div>
        <div class="status-card">
          <span class="pulse"></span>
          <div>
            <p class="label">Server</p>
            <strong id="server-status">Checking...</strong>
          </div>
        </div>
      </section>

      <section class="panel browser-demo">
        <div>
          <p class="eyebrow">Live voice experience</p>
          <h2>Start AI Assistant Call</h2>
          <p class="muted">
            Talk naturally and the assistant will listen, respond, and collect details in realtime.
          </p>
        </div>
        <div class="call-controls">
          <button id="start-browser-call" type="button">Start Demo Call</button>
          <button id="stop-browser-call" type="button" disabled>End Call</button>
          <strong id="browser-call-status">Idle</strong>
        </div>
        <audio id="remote-audio" autoplay></audio>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Live Call Events</h2>
          <button id="clear-events" type="button">Clear</button>
        </div>
        <div id="events" class="events" aria-live="polite"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
